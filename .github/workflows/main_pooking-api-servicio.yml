# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - Pooking-API-Servicio

on:
  push:
    branches:
      - main
    paths:
      - 'Servicio/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build Servicio/Microservicio.Pooking.Servicio.Api/Microservicio.Pooking.Servicio.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish Servicio/Microservicio.Pooking.Servicio.Api/Microservicio.Pooking.Servicio.Api.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F514FF14FBFA47B0923FD141565D6355 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8FCB6317B30F4AF085326A21273CC26A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4E4F0E73FE4943EC9DC1CDE08382E2E6 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Pooking-API-Servicio'
          slot-name: 'Production'
          package: .
          